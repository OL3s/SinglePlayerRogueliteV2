<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" shape-rendering="crispEdges">
  <rect width="128" height="128" fill="none"/>

  <!-- Shadow -->
  <rect x="24" y="104" width="80" height="8" fill="#201820" opacity="0.45"/>

  <!-- Roof outline -->
  <rect x="40" y="24" width="48" height="8" fill="#3a1f2b"/>
  <rect x="32" y="32" width="64" height="8" fill="#3a1f2b"/>
  <rect x="24" y="40" width="80" height="8" fill="#3a1f2b"/>
  <rect x="16" y="48" width="96" height="8" fill="#3a1f2b"/>

  <!-- Roof fill -->
  <rect x="40" y="32" width="48" height="8" fill="#8f3f3f"/>
  <rect x="32" y="40" width="64" height="8" fill="#a94d45"/>
  <rect x="24" y="48" width="80" height="8" fill="#c45b4e"/>
  <rect x="32" y="56" width="64" height="8" fill="#6f3438"/>

  <!-- Chimney -->
  <rect x="80" y="16" width="16" height="24" fill="#4b2d32"/>
  <rect x="88" y="16" width="8" height="24" fill="#6b3b3f"/>
  <rect x="80" y="8" width="16" height="8" fill="#2a1a22"/>

  <!-- Walls outline -->
  <rect x="24" y="64" width="80" height="48" fill="#2b2430"/>

  <!-- Walls fill -->
  <rect x="32" y="64" width="64" height="40" fill="#b88455"/>
  <rect x="40" y="64" width="8" height="40" fill="#d19a62"/>
  <rect x="80" y="64" width="8" height="40" fill="#8e643f"/>

  <!-- Wooden beams -->
  <rect x="32" y="64" width="64" height="8" fill="#6f442e"/>
  <rect x="32" y="96" width="64" height="8" fill="#6f442e"/>
  <rect x="32" y="64" width="8" height="40" fill="#4a2f27"/>
  <rect x="88" y="64" width="8" height="40" fill="#4a2f27"/>

  <!-- Door -->
  <rect x="56" y="80" width="24" height="24" fill="#2e1d24"/>
  <rect x="64" y="80" width="16" height="24" fill="#59352a"/>
  <rect x="72" y="88" width="4" height="4" fill="#d6b35f"/>

  <!-- Windows -->
  <rect x="40" y="76" width="12" height="12" fill="#2e1d24"/>
  <rect x="44" y="76" width="8" height="8" fill="#f1c86b"/>
  <rect x="84" y="76" width="12" height="12" fill="#2e1d24"/>
  <rect x="84" y="76" width="8" height="8" fill="#f1c86b"/>

  <!-- Ground trim -->
  <rect x="24" y="104" width="80" height="8" fill="#3b2f2f"/>
  <rect x="32" y="104" width="64" height="4" fill="#6d5540"/>
